<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time World - Главная</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styleClock.css">
</head>
<body>
  <header class="header">
    <div class="container header__top">
      <a class="logo" href="index.html" aria-label="Time World - Главная">
        <span class="logo__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"></circle>
            <path d="M12 7v6l4 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </span>
        <strong class="logo__text">Time World</strong>
      </a>

      <form class="search" action="#" method="get" role="search">
        <label class="visually-hidden" for="search-input">Поиск часов</label>
        <div class="search__field">
          <span class="search__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"></circle>
              <path d="M16.5 16.5L21 21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            </svg>
          </span>
          <input id="search-input" type="search" name="q" placeholder="Поиск по каталогу">
        </div>
      </form>

      <a class="cart-link" href="cart.html" aria-label="Перейти в корзину">
        <span class="cart-link__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M4 5h2l2.2 10h9.8l2-7H8" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"></path>
            <circle cx="10" cy="20" r="1.5"></circle>
            <circle cx="18" cy="20" r="1.5"></circle>
          </svg>
        </span>
        <span>Корзина</span>
        <span class="cart-link__count" id="cart-count">0</span>
      </a>
    </div>

    <nav class="nav container" aria-label="Главное меню">
      <ul class="nav__list">
        <li><a href="index.html">Главная</a></li>
        <li><a href="catalog.html">Каталог</a></li>
        <li><a href="about.html">О нас</a></li>
        <li><a href="delivery.html">Доставка</a></li>
        <li><a href="contacts.html">Контакты</a></li>
      </ul>
    </nav>
  </header>

</body>
</html>
