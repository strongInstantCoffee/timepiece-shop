<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time World - Оформление заказа</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header__top">
      <a class="logo" href="index.html"><strong class="logo__text">Time World</strong></a>
      <form class="search" action="#" method="get" role="search"><label class="visually-hidden" for="checkout-search">Поиск</label><div class="search__field"><input id="checkout-search" type="search" placeholder="Поиск по каталогу"></div></form>
      <a class="cart-link" href="cart.html">Корзина <span class="cart-link__count" id="cart-count">0</span></a>
    </div>
    <nav class="nav container" aria-label="Главное меню">
      <ul class="nav__list">
        <li><a href="index.html">Главная</a></li><li><a href="catalog.html">Каталог</a></li><li><a href="about.html">О нас</a></li><li><a href="delivery.html">Доставка</a></li><li><a href="contacts.html">Контакты</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Оформление заказа</h1>
    <form id="checkout-form" class="checkout-layout">
      <div class="checkout-fields">
        <label>ФИО <input type="text" name="fullname" required></label>
        <label>Телефон <input type="tel" name="phone" required></label>
        <label>Адрес <textarea name="address" rows="4" required></textarea></label>
      </div>
      <div class="checkout-options">
        <fieldset>
          <legend>Способ оплаты</legend>
          <label><input type="radio" name="payment" value="card" checked> Карта</label>
          <label><input type="radio" name="payment" value="cash"> Наличные</label>
        </fieldset>
        <fieldset>
          <legend>Способ доставки</legend>
          <label><input type="radio" name="delivery" value="courier" checked> Курьер</label>
          <label><input type="radio" name="delivery" value="pickup"> Самовывоз</label>
        </fieldset>
        <button class="btn-primary" type="submit">Заказать</button>
      </div>
    </form>
  </main>

  <footer class="footer">
    <div class="container footer__content">
      <section class="footer__contacts"><h2>Контакты</h2><p>Email: <a href="mailto:hello@timeworld.ru">hello@timeworld.ru</a></p><p>Телефон: <a href="tel:+375292725156">+375 (29) 272-51-56</a></p></section>
      <p class="footer__meta">© 2026 Time World</p>
    </div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
