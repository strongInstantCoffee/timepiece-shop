<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time World - Корзина</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header__top">
      <a class="logo" href="index.html"><strong class="logo__text">Time World</strong></a>
      <form class="search" action="#" method="get" role="search"><label class="visually-hidden" for="cart-search">Поиск</label><div class="search__field"><input id="cart-search" type="search" placeholder="Поиск по каталогу"></div></form>
      <a class="cart-link" href="cart.html">Корзина <span class="cart-link__count" id="cart-count">0</span></a>
    </div>
    <nav class="nav container" aria-label="Главное меню">
      <ul class="nav__list">
        <li><a href="index.html">Главная</a></li><li><a href="catalog.html">Каталог</a></li><li><a href="about.html">О нас</a></li><li><a href="delivery.html">Доставка</a></li><li><a href="contacts.html">Контакты</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Корзина</h1>
    <section class="cart-layout">
      <div id="cart-items" class="cart-items"></div>
      <aside class="cart-summary">
        <label for="promo-code">Промокод</label>
        <div class="promo-row">
          <input id="promo-code" type="text" placeholder="Введите код">
          <button type="button" id="apply-promo">Применить</button>
        </div>
        <p class="cart-summary__total">Итого: <strong id="cart-total">0 BYN</strong></p>
        <a class="btn-primary" href="checkout.html">Оформить заказ</a>
      </aside>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__content">
      <section class="footer__contacts"><h2>Контакты</h2><p>Email: <a href="mailto:hello@timeworld.ru">hello@timeworld.ru</a></p><p>Телефон: <a href="tel:+375292725156">+375 (29) 272-51-56</a></p></section>
      <p class="footer__meta">© 2026 Time World</p>
    </div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
